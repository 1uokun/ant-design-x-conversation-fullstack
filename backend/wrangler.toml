name = "ant-design-x-conversation"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# 默认模型，可在 Cloudflare Dashboard 或 .dev.vars 覆盖
DEFAULT_MODEL = "deepseek-chat"

[[d1_databases]]
binding = "DB"
database_name = "ant-design-x-conversation"
database_id = "44eaa854-3b7a-4419-b3cd-939ce3430393"
migrations_dir = "db/migrations"

[[kv_namespaces]]
binding = "STREAM_KV"
id = "5cb69b54c84b4c369495e2718c69c360"

[dev]
port = 8787
